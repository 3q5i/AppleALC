name: Build AppleALC

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Clone MacKernelSDK
        run: git clone https://github.com/acidanthera/MacKernelSDK

      - name: Download Lilu
        run: |
          curl -sL $(curl -s https://api.github.com/repos/acidanthera/Lilu/releases/latest | grep browser_download_url | grep DEBUG | head -1 | cut -d'"' -f4) -o Lilu.zip
          unzip Lilu.zip

      - name: Build
        run: xcodebuild -scheme AppleALC -configuration Release build

      - name: Upload kext
        uses: actions/upload-artifact@v4
        with:
          name: AppleALC-kext
          path: build/Release/AppleALC.kext
