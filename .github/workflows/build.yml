name: Build AppleALC

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Clone MacKernelSDK
        run: git clone https://github.com/acidanthera/MacKernelSDK

      - name: Download Lilu
        run: |
          gh release download --repo acidanthera/Lilu --pattern '*DEBUG*' -D /tmp/lilu
          unzip /tmp/lilu/*.zip
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Build
        run: xcodebuild -scheme AppleALC -configuration Release -derivedDataPath build build

      - name: Upload kext
        uses: actions/upload-artifact@v4
        with:
          name: AppleALC-kext
          path: build/Build/Products/Release/AppleALC.kext
